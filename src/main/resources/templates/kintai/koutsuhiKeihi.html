<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
  <title>交通費・経費</title>
  <script th:src="@{/js/kintai/koutsuhiKeihi.js}" defer></script>
  <link rel="stylesheet" th:href="@{/css/kintai/list.css}"> 
  <script th:inline="javascript">
    const sessionUserName = /*[[${sessionUserName}]]*/ "defaultUser";
  </script>
</head>

<body>
<div layout:fragment="content">

  <div>
    <button id="prevMonth">＜前月</button>
    <span id="currentMonthLabel"></span>
    <button id="nextMonth">次月＞</button>
  </div>

  <!-- === 交通費フォーム === -->
  <div class="header border-bottom">
    <h1 class="h2">交通費</h1>
  </div>
  <form id="koutsuhi-form">
    <input type="hidden" name="userId" th:value="${sessionUserName}" />
    <table id="koutsuhiTable" border="1">
      <thead>
        <tr>
          <th>日付</th><th>手段</th><th>出発地</th><th>到着地</th>
          <th>経由地</th><th>金額</th><th>特記事項</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="koutsuhiTableBody">
        <!-- 初期行はJSで制御します -->
      </tbody>
    </table>
    <br>
    <button type="button" id="add-koutsuhi-row">行を追加</button>
    <button type="button" id="btn-save-koutsuhi">保存（交通費）</button>
  </form>

  <!-- === 経費フォーム === -->
  <div class="header border-bottom mt-4">
    <h1 class="h2">経費</h1>
  </div>
  <form id="keihi-form">
    <input type="hidden" name="userId" th:value="${sessionUserName}" />
    <table id="keihiTable" border="1">
      <thead>
        <tr>
          <th>日付</th><th>手段</th><th>出発地</th><th>到着地</th>
          <th>経由地</th><th>金額</th><th>特記事項</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="keihiTableBody">
        <!-- 初期行はJSで制御します -->
      </tbody>
    </table>
    <br>
    <button type="button" id="add-keihi-row">行を追加</button>
    <button type="button" id="btn-save-keihi">保存（経費）</button>
  </form>

  <script>
    'use strict';

    // 手段の選択肢
    const methodsKoutsuhi = ["電車(片道)", "電車(往復)", "電車(定期券)", "バス(片道)", "バス(往復)", "バス(定期券)", "タクシー", "航空機", "その他"];
    const methodsKeihi = ["電車(片道)", "電車(往復)", "電車(定期券)", "バス(片道)", "バス(往復)", "バス(定期券)", "タクシー", "航空機", "その他"];

    // index初期値
    let koutsuhiIndex = 0;
    let keihiIndex = 0;

    // 月表示用日付
    let currentDate = new Date();

    // 月表示更新
    function updateMonthLabel() {
      const y = currentDate.getFullYear();
      const m = currentDate.getMonth() + 1;
      document.getElementById("currentMonthLabel").textContent = `${y}年${m}月`;
    }

    // セレクトのoptionを作る関数
    function createOptions(options, selected) {
      return options.map(opt => {
        return `<option value="${opt}" ${opt === selected ? 'selected' : ''}>${opt}</option>`;
      }).join('');
    }

  
    // APIから交通費データ取得・描画
    function reloadKoutsuhiTable(userId, dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const yearMonth = `${year}-${month}`;

      fetch(`/kintai/keihi/listKoutsuhi?userId=${encodeURIComponent(userId)}&yearMonth=${yearMonth}`)
        .then(response => response.json())
        .then(data => {
          const tbody = document.getElementById('koutsuhiTableBody');
          tbody.innerHTML = '';
          if (!Array.isArray(data)) data = [];

          if (data.length === 0) {
            addRow('koutsuhiTableBody', 'koutsuhiList', 0, methodsKoutsuhi);
            koutsuhiIndex = 1;
          } else {
            data.forEach((k, i) => {
				const isExisting = k.id !== undefined && k.id !== null;
              addRow('koutsuhiTableBody', 'koutsuhiList', i, methodsKoutsuhi, k);
            });
            koutsuhiIndex = data.length;
          }
        })
        .catch(() => {
          alert("交通費の取得に失敗しました");
          const tbody = document.getElementById('koutsuhiTableBody');
          tbody.innerHTML = '';
          addRow('koutsuhiTableBody', 'koutsuhiList', 0, methodsKoutsuhi);
          koutsuhiIndex = 1;
        });
    }

    // APIから経費データ取得・描画
	function reloadKeihiTable(userId, dateObj) {
	  const year = dateObj.getFullYear();
	  const month = String(dateObj.getMonth() + 1).padStart(2, '0');
	  const yearMonth = `${year}-${month}`;
	
	  fetch(`/kintai/keihi/listKeihi?userId=${encodeURIComponent(userId)}&yearMonth=${yearMonth}`)
	    .then(response => response.json())
	    .then(data => {
	      const tbody = document.getElementById('keihiTableBody');
	      tbody.innerHTML = '';
	      if (!Array.isArray(data)) data = [];
	
	      if (data.length === 0) {
	        addRow('keihiTableBody', 'keihiList', 0, methodsKeihi);
	        keihiIndex = 1;  // ← ここを修正
	      } else {
	        data.forEach((k, i) => {
	          addRow('keihiTableBody', 'keihiList', i, methodsKeihi, k);
	        });
	        keihiIndex = data.length;  // ← ここも修正
	      }
	    })
	    .catch(() => {
	      alert("経費の取得に失敗しました");
	      const tbody = document.getElementById('keihiTableBody');
	      tbody.innerHTML = '';
	      addRow('keihiTableBody', 'keihiList', 0, methodsKeihi);
	      keihiIndex = 1;  // ← ここも修正
	    });
	}

    // 行削除イベント
    document.addEventListener('click', function(e) {
      if (e.target && e.target.classList.contains('remove-row')) {
        const tr = e.target.closest('tr');
        if (!tr) return;
        const tbody = tr.parentNode;
        tr.remove();

        if (tbody.id === 'koutsuhiTableBody') {
          refreshIndexes('koutsuhiTableBody', 'koutsuhiList');
          koutsuhiIndex = tbody.querySelectorAll('tr').length;
          if (koutsuhiIndex === 0) {
            addRow('koutsuhiTableBody', 'koutsuhiList', 0, methodsKoutsuhi);
            koutsuhiIndex = 1;
          }
        } else if (tbody.id === 'keihiTableBody') {
          refreshIndexes('keihiTableBody', 'keihiList');
          keihiIndex = tbody.querySelectorAll('tr').length;
          if (keihiIndex === 0) {
            addRow('keihiTableBody', 'keihiList', 0, methodsKeihi);
            keihiIndex = 1;
          }
        }
      }
    });

    // 行追加イベント
    document.getElementById('add-koutsuhi-row').addEventListener('click', () => {
      addRow('koutsuhiTableBody', 'koutsuhiList', koutsuhiIndex, methodsKoutsuhi);
      koutsuhiIndex++;
    });

    document.getElementById('add-keihi-row').addEventListener('click', () => {
      addRow('keihiTableBody', 'keihiList', keihiIndex, methodsKeihi);
      keihiIndex++;
    });

    // 保存イベント
	function saveForm(formId, url) {
	  const form = document.getElementById(formId);
	  const formData = new FormData(form);
	  fetch(url, {
	    method: 'POST',
	    body: formData,
	  })
	    .then(res => {
	      if (!res.ok) throw new Error('保存に失敗しました');
	      alert(formId === 'koutsuhi-form' ? '交通費を保存しました' : '経費を保存しました');
	
	      // 保存成功時にフォーム内の入力欄をdisabledにし、編集ボタンのテキストを「編集」に戻す
	      const tbody = form.querySelector('tbody');
	      if (!tbody) return;
	
	      tbody.querySelectorAll('tr').forEach(tr => {
	        tr.querySelectorAll('input, select').forEach(input => {
	          // hiddenのIDフィールドはdisabledにしない
	          if (!input.name.endsWith('Id')) {
	            input.disabled = true;
	          }
	        });
	
	        // 編集ボタンのテキストを「編集」に戻す
	        const editBtn = tr.querySelector('button.edit-row');
	        if (editBtn) {
	          editBtn.textContent = '編集';
	        }
	      });
	    })
	    .catch(() => alert('保存に失敗しました'));
	}
	
	document.getElementById('btn-save-koutsuhi').addEventListener('click', () => {
	  refreshIndexes('koutsuhiTableBody', 'koutsuhiList');
	  saveForm('koutsuhi-form', '/kintai/keihi/saveKoutsuhi');
	});
	
	document.getElementById('btn-save-keihi').addEventListener('click', () => {
	  refreshIndexes('keihiTableBody', 'keihiList');
	  saveForm('keihi-form', '/kintai/keihi/saveKeihi');
	});


    // 月ボタン処理
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      updateMonthLabel();
      reloadKoutsuhiTable(sessionUserName, currentDate);
      reloadKeihiTable(sessionUserName, currentDate);
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      updateMonthLabel();
      reloadKoutsuhiTable(sessionUserName, currentDate);
      reloadKeihiTable(sessionUserName, currentDate);
    });

    // 初期表示
    updateMonthLabel();
    reloadKoutsuhiTable(sessionUserName, currentDate);
    reloadKeihiTable(sessionUserName, currentDate);

  </script>

</div>
</body>
</html>
