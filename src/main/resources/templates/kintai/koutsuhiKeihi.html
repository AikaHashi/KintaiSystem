<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>交通費・経費</title>
	<script th:src="@{/js/kintai/koutsuhiKeihi.js}" defer></script>
	<link rel="stylesheet" th:href="@{/css/kintai/list.css}">
	<script th:inline="javascript">
	        // null 安全な変数設定
	        const targetUserName = /*[[${targetUserName} != null ? ${targetUserName} : 'defaultUser']]*/ 'defaultUser';
	        const sessionUserName = /*[[${sessionUserName} != null ? ${sessionUserName} : 'defaultUser']]*/ 'defaultUser';
			window.targetUserId = /*[[${targetUserId}]]*/ 'defaultUser';
	        const koutsuhiList = /*[[${koutsuhiList} != null ? ${koutsuhiList} : '[]']]*/ [];
	        const keihiList = /*[[${keihiList} != null ? ${keihiList} : '[]']]*/ [];
			const statusKoutsuhi= /*[[${statusKoutsuhi} != null ? ${statusKoutsuhi} : '[]']]*/ [];
			const statusKeihi= /*[[${statusKeihi} != null ? ${statusKeihi} : '[]']]*/ [];
			
	</script>
</head>

<body>
	<div layout:fragment="content">

		<div>
			<button id="prevMonth">＜前月</button>
			<span id="currentMonthLabel"></span>
			<button id="nextMonth">次月＞</button>
		</div>

		<!-- === 交通費フォーム === -->
		<div class="header border-bottom">
			<h1 class="h2">交通費</h1>
		</div>
		<p>現在のrole: <span th:text="${role}">未設定</span></p>
		<p>status: <span id="statusSpanKoutsuhi" th:text="${statusKoutsuhi}">未申請</span></p>
		<!-- ROLE_ADMIN以外（申請者用） -->
		<div th:if="${user != null and user.role != 'ROLE_ADMIN'}">
			<button type="button" id="applyKoutsuhiBtn">申請（交通費）</button>
			<button type="button" id="reapplyKoutsuhiBtn">再申請（交通費）</button>
		</div>

		<!-- ROLE_ADMIN（管理者用） -->
<!--		<div th:if="${user != null and user.role == 'ROLE_ADMIN'}">-->
			<button type="button" id="approveKoutsuhiBtn">承認（交通費）</button>
			<button type="button" id="rejectKoutsuhiBtn">差戻（交通費）</button>
<!--		</div>-->

		<form id="koutsuhi-form" th:action="@{/kintai/koutsuhi/save}" method="post">
			<!-- ★ CSRF hidden（安全版） -->
			<input type="hidden" name="_csrf" th:value="${_csrf != null ? _csrf.token : ''}" />

			<input type="hidden" name="userId" th:value="${sessionUserId}" />
			<input type="hidden" id="deletedKoutsuhiIds" name="deletedKoutsuhiIds" />
			<input type="hidden" id="rejectKoutsuhiComment" name="comment" />
			<input type="hidden" id="koutsuhiYearMonth" name="yearMonth" th:value="${yearMonth}" />

			<div class="table-wrapper">
			<table id="koutsuhiTable" border="1">
				<thead>
					<tr>
						<th>日付</th>
						<th>手段</th>
						<th>出発地</th>
						<th>到着地</th>
						<th>経由地</th>
						<th>金額</th>
						<th>特記事項</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody id="koutsuhiTableBody"></tbody>
			</table>
			</div>
			<br>
			<button type="button" id="add-koutsuhi-row">行を追加</button>
			<button type="button" id="btn-save-koutsuhi">保存（交通費）</button>
		</form>

		<!-- === 経費フォーム === -->
		<div class="header border-bottom mt-4">
			<h1 class="h2">経費</h1>
		</div>
		<p>status: <span id="statusSpanKeihi" th:text="${statusKeihi}">未申請</span></p>

		<!-- ROLE_ADMIN以外（申請者用） -->
		<div th:if="${user != null and user.role != 'ROLE_ADMIN'}">
			<button type="button" id="applyKeihiBtn">申請（経費）</button>
			<button type="button" id="reapplyKeihiBtn">再申請（経費）</button>
		</div>

		<!-- ROLE_ADMIN（管理者用） -->
<!--		<div th:if="${user != null and user.role == 'ROLE_ADMIN'}">-->
			<button type="button" id="approveKeihiBtn">承認（経費）</button>
			<button type="button" id="rejectKeihiBtn">差戻（経費）</button>
<!--		</div>-->

		<form id="keihi-form" th:action="@{/kintai/keihi/save}" method="post">
			<!-- ★ CSRF hidden（安全版） -->
			<input type="hidden" name="_csrf" th:value="${_csrf != null ? _csrf.token : ''}" />

			<input type="hidden" name="userId" th:value="${sessionUserId}" />
			<input type="hidden" id="deletedKeihiIds" name="deletedKeihiIds" />
			<input type="hidden" id="rejectKeihiComment" name="comment" />
			<input type="hidden" id="keihiYearMonth" name="yearMonth" th:value="${yearMonth}" />

			<div class="table-wrapper">
			<table id="keihiTable" border="1">
				<thead>
					<tr>
						<th>日付</th>
						<th>手段</th>
						<th>出発地</th>
						<th>到着地</th>
						<th>経由地</th>
						<th>金額</th>
						<th>特記事項</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody id="keihiTableBody"></tbody>
			</table>
			</div>
			<br>
			<button type="button" id="add-keihi-row">行を追加</button>
			<button type="button" id="btn-save-keihi">保存（経費）</button>
		</form>

	</div>
</body>

</html>
