<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/layout}">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
	<nav layout:fragment="header" class="navbar navbar-inverse navbar-fixed-top navbar-dark bg-dark">
		<div class="container-fluid">
			<div class="navbar-header">
				<a class="navbar-brand" href="#">Kintai portal</a>
			</div>

			<!-- ログインユーザー名の表示 -->
			<div class="navbar-text">
				<span th:text="${sessionUserName} + 'さん'">ユーザー名</span>
			</div>

			<!-- ログアウトボタン -->
			<form method="post" th:action="@{/logout}">
				<button class="btn btn-link pull-right navbar-brand" type="submit">
					ログアウト
				</button>
			</form>

		</div>
	</nav>
</body>
</html>
