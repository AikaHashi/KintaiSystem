spring.application.name=SpringBootSample

# -------------------------
# DataSource (H2メモリモード)
# -------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.sql-script-encoding=UTF-8

# schema.sql / data.sql を起動時に自動実行
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# -------------------------
# H2DBコンソール
# -------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -------------------------
# メッセージ
# -------------------------
spring.messages.basename=i18n/messages,i18n/ValidationMessages

# -------------------------
# MyBatis
# -------------------------
mybatis.mapper-locations=classpath*:mapper/h2/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.domain.kintai.model

# -------------------------
# ログ設定
# -------------------------
logging.level.com.example=debug
logging.level.org.springframework.web=debug
logging.level.org.springframework.boot.web.servlet.error=debug
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=debug
logging.level.root=debug
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# -------------------------
# SMTP設定（Gmail）
# -------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=gummysk9@gmail.com
spring.mail.password=ohaosoahnjyxpdyd
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# -------------------------
# Spring設定
# -------------------------
spring.main.allow-circular-references=true
