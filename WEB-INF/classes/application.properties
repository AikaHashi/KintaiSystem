spring.datasource.url=jdbc:mysql://127.0.0.1:3306/kintai?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Tokyo
spring.datasource.username=suser
spring.datasource.password=Spass123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# schema.sql / data.sql を起動時に自動実行
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql


# -------------------------
# H2DBコンソール
# -------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -------------------------
# メッセージ
# -------------------------
spring.messages.basename=i18n/messages,i18n/ValidationMessages

# -------------------------
# MyBatis
# -------------------------
mybatis.mapper-locations=classpath*:mapper/h2/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.domain.kintai.model

# -------------------------
# ログ設定
# -------------------------
logging.level.com.example=debug
logging.level.org.springframework.web=debug
logging.level.org.springframework.boot.web.servlet.error=debug
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=debug
logging.level.root=debug
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# -------------------------
# SMTP設定（Gmail）
# -------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=gummysk9@gmail.com
spring.mail.password=ohaosoahnjyxpdyd
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# -------------------------
# Spring設定
# -------------------------
spring.main.allow-circular-references=true

# -------------------------
# Context Path 設定（外部Tomcatで /login でアクセスできるように）
# -------------------------
server.servlet.context-path=/
